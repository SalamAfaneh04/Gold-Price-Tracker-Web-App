<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Asset</title>
    <link rel="stylesheet" href="/cssFiles/myAsset.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/cssFiles/style.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
    <div class="nav-brand">
        <span class="nav-icon">⬡</span>
        <span class="nav-title">GoldVault</span>
    </div>
    <ul class="nav-links">
        <li><a href="index.html" >Home</a></li>
        <li><a href="prices.html">Gold Prices</a></li>
        <li><a href="myAsset.html" class="active">My Assets</a></li>
    </ul>    
    <div class="dropdown">
          <a href="#" class="d-block link-dark text-decoration-none dropdown-toggle" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
            <img src="images/female.png" alt="mdo" width="32" height="32" class="rounded-circle " id="selectImg">
          </a>
          <ul class="dropdown-menu dropdown-menu-end text-small" aria-labelledby="dropdownUser">
            <li><a class="dropdown-item" href="#">Profile</a></li>
            <li><a class="dropdown-item" href="#">Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="index.html">Sign out</a></li>
          </ul>
        </div>
    <button class="nav-toggle" id="navToggle">☰</button>
    </nav>

    <div>
        <h2>
            Prices
        </h2>
    </div>
    
    <!-- GOLD RATES STRIP -->
    <section class="rates-strip">
    <div class="rates-grid">
        <div class="rate-card karat24">
            <div class="rate-karat">24K</div>
            <div class="rate-name">Pure Gold</div>
            <div class="rate-price" id="rate24">—</div>
            <div class="rate-unit">per gram</div>
        </div>
        <div class="rate-card karat21">
            <div class="rate-karat">21K</div>
            <div class="rate-name">Premium</div>
            <div class="rate-price" id="rate21">—</div>
            <div class="rate-unit">per gram</div>
        </div>
        <div class="rate-card karat18">
            <div class="rate-karat">18K</div>
            <div class="rate-name">Standard</div>
            <div class="rate-price" id="rate18">—</div>
            <div class="rate-unit">per gram</div>
        </div>
        <div class="rate-card coin-card">
            <img src="assets/images/rashadi_coin.jpg" alt="Rashadi Coin" class="coin-img"/>
            <div class="rate-karat">Rashadi</div>
            <div class="rate-price" id="rateRashadi">—</div>
            <div class="rate-unit">per lira</div>
        </div>
        <div class="rate-card coin-card">
            <img src="assets/images/english_coin.jpg" alt="English Coin" class="coin-img"/>
            <div class="rate-karat">English</div>
            <div class="rate-price" id="rateEnglish">—</div>
            <div class="rate-unit">per lira</div>
        </div>
        <div class="rate-card bar-card">
            <img src="assets/images/gold-bar.png" alt="Gold Bar" class="bar-img"/>
            <div class="rate-karat">Gold Bar</div>
            <div class="rate-price" id="rateBar">—</div>
            <div class="rate-unit">1 kg bar</div>
        </div>
    </div>
    </section>

    <div>
        <h3>
            All Asset
        </h3>
    </div>

    <!-- Search  -->
    <form class="form-inline">
        <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#formModal">
        Add Asset
        </button>
    </form>

    <!-- My All Assets  -->
    <div class="rates-grid">
        <div class="rate-card coin-card">
            <img src="assets/images/rashadi_coin.jpg" alt="Rashadi Coin" class="coin-img"/>
            <div class="rate-karat">Rashadi</div>
            <div class="rate-price" id="rateRashadi">—</div>
            <div class="rate-unit">per lira</div>
        </div>
        
    </div>


    <!-- Add Asset modul -->
    <div class="modal fade" id="formModal" tabindex="-1" aria-labelledby="formModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered"> <div class="modal-content">
            
            <div class="modal-header">
                <h5 class="modal-title" id="formModalLabel">Add New Asset</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <form id="inventoryForm">
                <div class="mb-3">
                    <label for="category" class="form-label">Type</label>
                    <select class="form-select" id="category">
                        <option selected disabled>Choose...</option>
                        <option value="Jewelry ">Jewelry </option>
                        <option value="Bars ">Bars </option>
                        <option value="Coins">Coins</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="category" class="form-label">Karat</label>
                    <select class="form-select" id="category">
                    <option selected disabled>Choose...</option>
                    <option value="24K">24 K</option>
                    <option value="21K">21 K</option>
                    <option value="18K">18 K</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="categoryJ">
                        <option selected disabled>Choose...</option>
                        <option value="Ring">Ring</option>
                        <option value="Necklace">Necklace</option>
                        <option value="Watch">Watch</option>
                        <option value="Belt">Belt</option>
                        <option value="Anklet">Anklet</option>
                    </select>
                    <select class="form-select" id="categoryC">
                        <option selected disabled>Choose...</option>
                        <option value="Rashadi">Rashadi</option>
                        <option value="English">English</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                    <label for="price" class="form-label">Purchase Price ($)</label>
                    <input type="number" class="form-control" id="price" placeholder="0.00">
                    </div>
                    <div class="col-md-6 mb-3">
                    <label for="quantity" class="form-label">Weight(g)</label>
                    <input type="number" class="form-control" id="quantity" placeholder="1">
                    </div>
                </div>

                <div class=" mb-3">
                    <label for="entryDate" class="form-label fw-bold">Date Added</label>
                    <input type="date" class="form-control" id="entryDate">
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" rows="3"></textarea>
                </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="inventoryForm" class="btn btn-primary">Save Product</button>
            </div>

            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/jsFiles/app.js"></script>

</body>
</html>
